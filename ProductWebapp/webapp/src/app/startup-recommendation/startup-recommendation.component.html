      <div class ="tabs" >
        <h1 >Interested Stage:</h1>
        <button class="button1" (click)="stageRecomendation()">{{stage}}</button>
      </div>

        <h1 >Interested Category:</h1>

      <div class="product-mat-card-list">
        <mat-list *ngFor="let product of products;let i = index">
          <mat-list-item>
            <mat-card class="example-card">

              <mat-card-title style="font-weight: bold;text-align: center;">{{product.title}}</mat-card-title>
              <mat-card-content style="text-align: center;">
                <p>Category:{{product.category}}</p>
                <p>Stage:{{product.stage}}</p>
                <p>Business Model:{{product.businessModel}}</p>
                <p>Location:{{product.location}}</p>

              </mat-card-content>
              <img mat-card-image [src]='images[i]' style="width:300px;height:220px;margin-left: 10px;">
              <mat-card-actions>

              </mat-card-actions>
              <button mat-button class="button1" [routerLink]="['/viewDetails/'+ product.productId]">View
                Details</button>
            </mat-card>
          </mat-list-item>
        </mat-list>
      </div>
    </div>
